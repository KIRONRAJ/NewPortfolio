<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiron Raj | Cyber Security Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"JetBrains Mono"', 'monospace'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              primary: 'rgb(var(--color-primary) / <alpha-value>)',
              secondary: 'rgb(var(--color-secondary) / <alpha-value>)',
              accent: 'rgb(var(--color-accent) / <alpha-value>)',
              slate: {
                100: '#e6f1ff',
                300: '#ccd6f6',
                400: '#a8b2d1',
                500: '#8892b0',
              }
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root, [data-theme="green"] {
        --color-primary: 2 12 27;     /* #020c1b */
        --color-secondary: 17 34 64;  /* #112240 */
        --color-accent: 100 255 218;  /* #64ffda */
        --accent-hex: #64ffda;
      }
      [data-theme="purple"] {
        --color-primary: 30 30 46;    /* #1e1e2e */
        --color-secondary: 46 46 62;   /* #2e2e3e */
        --color-accent: 189 147 249;  /* #bd93f9 */
        --accent-hex: #bd93f9;
      }
      [data-theme="amber"] {
        --color-primary: 26 15 0;     /* #1a0f00 */
        --color-secondary: 43 26 0;    /* #2b1a00 */
        --color-accent: 255 176 0;    /* #ffb000 */
        --accent-hex: #ffb000;
      }
      [data-theme="monochrome"] {
        --color-primary: 15 15 17;    /* #0f0f11 */
        --color-secondary: 34 34 37;   /* #222225 */
        --color-accent: 255 255 255;  /* #ffffff */
        --accent-hex: #ffffff;
      }

      html {
        scroll-behavior: smooth;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      body {
        background-color: rgb(var(--color-primary));
        color: #ccd6f6;
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--color-primary));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--color-secondary));
        border: 1px solid rgb(var(--color-accent));
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--color-accent));
      }
      
      .cursor-blink {
        animation: blink 1s step-end infinite;
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <!-- Hidden form for Netlify detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
